<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Cases - E-commerce</title>
    <link rel="stylesheet" href="style.css">
 <script src="https://assets.adobedtm.com/4fa03d1212c6/b06903e8340c/launch-28de27840a85-development.min.js" async></script>
    
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span>📱</span>
                <h1>Phone Cases</h1>
            </div>
            <div class="nav-menu">
                <button class="nav-link active" data-page="home">Home</button>
                <button class="nav-link" data-page="manual">Manual</button>
                <button class="nav-link" data-page="default">Default</button>
                <button class="nav-link" data-page="madebyme">Made By me</button>
                <button class="nav-link" data-page="phonetypes">Phone Types</button>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="page-container">
            <div class="page-header">
                <h2 id="pageTitle">All Phone Cases</h2>
                <p id="pageDescription">Browse our complete collection of premium phone cases</p>
            </div>

            <!-- PHONE TYPE FILTER (only visible on phonetypes page) -->
            <div id="phoneTypeFilter" class="phone-type-filter" style="display: none;">
                <h3>Select Your Phone Type</h3>
                <div class="phone-type-buttons">
                    <button class="phone-type-btn active" data-phone-type="iPhone">
                        <span class="phone-icon">📱</span>
                        <span>iPhone</span>
                    </button>
                    <button class="phone-type-btn" data-phone-type="Samsung">
                        <span class="phone-icon">📱</span>
                        <span>Samsung</span>
                    </button>
                    <button class="phone-type-btn" data-phone-type="OnePlus">
                        <span class="phone-icon">📱</span>
                        <span>OnePlus</span>
                    </button>
                    <button class="phone-type-btn" data-phone-type="Google Pixel">
                        <span class="phone-icon">🔍</span>
                        <span>Google Pixel</span>
                    </button>
                </div>
            </div>

            <!-- CASES GRID -->
            <div class="cases-grid" id="casesGrid">
                <!-- Cases will be loaded here by JavaScript -->
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2024 Phone Cases. All rights reserved. | Made for Adobe Target Learning</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
